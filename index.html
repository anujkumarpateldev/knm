<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DutchExamPro — Master Your Dutch Exam</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="logo" id="logo-home" style="cursor: pointer;">
        <img src="/logo.png" alt="DutchExamPro" class="header-logo-img" />
        <div class="header-brand-text">
          <div class="header-brand-name"><span style="color:var(--primary)">Dutch</span><span style="color:var(--brand-blue)">e</span><span style="color:var(--primary)">✕</span><span style="color:var(--brand-blue)">ampro</span></div>
          <div class="header-brand-tagline">Master Your Dutch Exam</div>
        </div>
      </div>
      <div class="header-controls" style="display: flex; gap: 1rem; align-items: center;">
         <div id="exam-timer" style="display: none; font-variant-numeric: tabular-nums; font-weight: 700; font-size: 1.1rem; color: var(--danger); background: rgba(239, 68, 68, 0.1); padding: 0.25rem 0.75rem; border-radius: 0.5rem; border: 1px solid rgba(239, 68, 68, 0.3);">
           45:00
         </div>
         <button id="theme-toggle" aria-label="Toggle Theme">
           <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
         </button>
      </div>
    </header>

    <!-- Dutch landscape background (dashboard only) -->
    <div id="dutch-bg" aria-hidden="true">
      <svg viewBox="0 0 1440 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
        <!-- Sky -->
        <defs>
          <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#b8dff5" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#fdf8f0" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <rect width="1440" height="500" fill="url(#skyGrad)"/>
        <!-- Clouds -->
        <g opacity="0.6">
          <ellipse cx="200" cy="80" rx="80" ry="30" fill="white"/>
          <ellipse cx="260" cy="70" rx="60" ry="28" fill="white"/>
          <ellipse cx="140" cy="90" rx="50" ry="22" fill="white"/>
          <ellipse cx="900" cy="60" rx="90" ry="32" fill="white"/>
          <ellipse cx="970" cy="50" rx="65" ry="28" fill="white"/>
          <ellipse cx="830" cy="72" rx="55" ry="24" fill="white"/>
        </g>
        <!-- Canal water -->
        <rect x="0" y="420" width="1440" height="80" fill="#b8dff5" opacity="0.3" rx="0"/>
        <!-- Houses -->
        <g opacity="0.25">
          <rect x="80" y="300" width="60" height="120" fill="#c8a882" rx="2"/>
          <polygon points="80,300 140,300 110,260" fill="#a07850"/>
          <rect x="95" y="340" width="18" height="22" fill="#b8dff5"/>
          <rect x="127" y="340" width="18" height="22" fill="#b8dff5"/>
          <rect x="180" y="310" width="70" height="110" fill="#d4b896" rx="2"/>
          <polygon points="180,310 250,310 215,265" fill="#a07850"/>
          <rect x="195" y="350" width="18" height="22" fill="#b8dff5"/>
          <rect x="227" y="350" width="18" height="22" fill="#b8dff5"/>
          <rect x="1200" y="305" width="65" height="115" fill="#c8a882" rx="2"/>
          <polygon points="1200,305 1265,305 1232,262" fill="#a07850"/>
          <rect x="1215" y="345" width="18" height="22" fill="#b8dff5"/>
          <rect x="1247" y="345" width="18" height="22" fill="#b8dff5"/>
          <rect x="1300" y="315" width="70" height="105" fill="#d4b896" rx="2"/>
          <polygon points="1300,315 1370,315 1335,270" fill="#a07850"/>
        </g>
        <!-- Windmill -->
        <g transform="translate(720,200)" opacity="0.2">
          <rect x="-8" y="0" width="16" height="160" fill="#8b6914"/>
          <rect x="-28" y="0" width="56" height="70" fill="#a07820"/>
          <!-- Blades -->
          <line x1="0" y1="30" x2="-70" y2="-50" stroke="#6b5010" stroke-width="6" stroke-linecap="round"/>
          <line x1="0" y1="30" x2="70" y2="-50" stroke="#6b5010" stroke-width="6" stroke-linecap="round"/>
          <line x1="0" y1="30" x2="-55" y2="110" stroke="#6b5010" stroke-width="6" stroke-linecap="round"/>
          <line x1="0" y1="30" x2="55" y2="110" stroke="#6b5010" stroke-width="6" stroke-linecap="round"/>
        </g>
        <!-- Tulips -->
        <g opacity="0.3">
          <line x1="350" y1="440" x2="350" y2="400" stroke="#5a8a3c" stroke-width="3"/>
          <ellipse cx="350" cy="395" rx="10" ry="14" fill="#f9b8c8"/>
          <line x1="380" y1="440" x2="380" y2="408" stroke="#5a8a3c" stroke-width="3"/>
          <ellipse cx="380" cy="403" rx="10" ry="14" fill="#ef4444"/>
          <line x1="410" y1="440" x2="410" y2="402" stroke="#5a8a3c" stroke-width="3"/>
          <ellipse cx="410" cy="397" rx="10" ry="14" fill="#fde9a2"/>
          <line x1="1000" y1="440" x2="1000" y2="400" stroke="#5a8a3c" stroke-width="3"/>
          <ellipse cx="1000" cy="395" rx="10" ry="14" fill="#f9b8c8"/>
          <line x1="1030" y1="440" x2="1030" y2="408" stroke="#5a8a3c" stroke-width="3"/>
          <ellipse cx="1030" cy="403" rx="10" ry="14" fill="#ef4444"/>
          <line x1="1060" y1="440" x2="1060" y2="402" stroke="#5a8a3c" stroke-width="3"/>
          <ellipse cx="1060" cy="397" rx="10" ry="14" fill="#c8f0e0"/>
        </g>
      </svg>
    </div>

    <!-- Main Container -->
    <main id="main-content">
      <!-- Views will be injected here: Dashboard / Quiz -->
      <div id="loading" class="view active">
         <div class="spinner"></div>
         <p>Loading Modules...</p>
      </div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
